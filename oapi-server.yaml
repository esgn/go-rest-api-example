package: api
generate:
  std-http-server: true # net/http server interface
  strict-server: false # adds validation layer
output: src/internal/gen/server.gen.go # will overwrite this file if it already exists
output-options:
  skip-prune: false # do not remove unused imports (default: false)
  nullable-type: false # generate dedicated nullable types for nullable fields (default: false)
  prefer-skip-optional-pointer: false # skip pointer for optional fields if not required (default: false)
compatibility:
  always-prefix-enum-values: false # always prefix enum values with the schema name (default: false)
