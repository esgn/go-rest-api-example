name: Deploy OpenAPI Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - openapi.yaml
      - docs/swagger/index.html
      - .github/workflows/deploy-openapi-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp docs/swagger/index.html _site/index.html
          cp openapi.yaml _site/openapi.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
