package: api
generate:
  models: true # Go structs from schemas (models is the new name for types)
output: src/internal/http/openapi/models.gen.go # will overwrite this file if it already exists
output-options:
  # do not remove unused imports (default: false)
  # skip-prune keeps all schemas/types from the OpenAPI document, even unused ones.
  skip-prune: false
  # generate dedicated nullable types for nullable fields (default: false)
  # use it when null semantics matter
  nullable-type: true
  # skip pointer for optional fields if not required (default: false)
  # only if you do not need to distinguish for field "missing" vs "present with zero value"
  prefer-skip-optional-pointer: false
compatibility:
  # always prefix enum values with the schema name (default: false)
  # always-prefix-enum-values reduces naming collisions and makes enum constants easier to understand in code by keeping them scoped/prefixed.
  always-prefix-enum-values: true
