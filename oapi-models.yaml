package: api
generate:
  models: true # Go structs from schemas (models is the new name for types)
output: src/internal/gen/models.gen.go # will overwrite this file if it already exists
output-options:
  skip-prune: true # do not remove unused imports (default: false)
  nullable-type: true # generate dedicated nullable types for nullable fields (default: false)
  prefer-skip-optional-pointer: true # skip pointer for optional fields if not required (default: false)
compatibility:
  always-prefix-enum-values: true # always prefix enum values with the schema name (default: false)
